services:
  - type: web
    name: financial-command-center
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn financial_command_center:server --bind 0.0.0.0:$PORT
    envVars:
      - key: RENDER
        value: "true"
      - key: PYTHON_VERSION
        value: 3.11.0
